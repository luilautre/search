<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Launcher</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #0f0f12;
  color: #f4f4f5;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1rem;
}
.container { width: 100%; max-width: 576px; }
.title {
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 14px;
  color: #71717a;
  font-weight: 500;
  margin-bottom: 32px;
  user-select: none;
}
.bar-wrap { position: relative; }
.bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: #1a1a1f;
  border: 1px solid rgba(63,63,70,0.6);
  border-radius: 12px;
  cursor: text;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
  transition: border-color .2s, background .2s;
}
.bar:focus-within {
  border-color: rgba(113,113,122,0.8);
  background: #1e1e24;
}
.chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: #e4e4e7;
  flex-shrink: 0;
  user-select: none;
  white-space: nowrap;
}
.chip-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: #71717a;
  display: flex;
  align-items: center;
  padding: 0;
  margin-left: 2px;
  transition: color .1s;
  flex-shrink: 0;
}
.chip-remove:hover { color: #d4d4d8; }
#query {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #f4f4f4;
  font-size: 14px;
  min-width: 0;
  font-family: inherit;
}
#query::placeholder { color: #52525b; }
.bar-hints {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}
.spinner {
  width: 14px; height: 14px;
  border: 2px solid #52525b;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: none;
}
.spinner.active { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
kbd {
  display: inline-flex;
  align-items: center;
  padding: 2px 6px;
  border-radius: 4px;
  background: #27272a;
  border: 1px solid #3f3f46;
  font-family: monospace;
  font-size: 12px;
  color: #52525b;
  user-select: none;
  line-height: 1.4;
}
.hint kbd { color: #71717a; }
.suggestions {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: #1a1a1f;
  border: 1px solid rgba(63,63,70,0.6);
  border-radius: 12px;
  overflow: hidden;
  z-index: 10;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  display: none;
  max-height: 400px;
  overflow-y: auto;
}
.suggestions.open { display: block; }
.suggestion {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  cursor: pointer;
  transition: background .1s, color .1s;
  border-top: 1px solid rgba(39,39,42,0.6);
  text-align: left;
  width: 100%;
  background: none;
  border-left: none; border-right: none; border-bottom: none;
  color: #d4d4d8;
  font-family: inherit;
}
.suggestion:first-child { border-top: none; }
.suggestion:hover { background: rgba(39,39,42,0.6); color: #f4f4f4; }
.suggestion.selected { background: rgba(63,63,70,0.4); color: #f4f4f4; }
.suggestion img {
  width: 60px; height: 28px;
  border-radius: 4px;
  object-fit: cover;
  opacity: .8;
  flex-shrink: 0;
  transition: opacity .1s;
}
.suggestion:hover img, .suggestion.selected img { opacity: 1; }
.suggestion-info { flex: 1; min-width: 0; }
.suggestion-name {
  font-size: 14px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.suggestion-sub { font-size: 12px; color: #52525b; }
.suggestion-price { font-size: 12px; color: #52525b; flex-shrink: 0; }
.status {
  margin-top: 16px;
  font-size: 12px;
  font-family: monospace;
  padding: 8px 12px;
  border-radius: 8px;
  display: none;
  word-break: break-all;
}
.status.show { display: block; }
.status.error { background: rgba(127,29,29,0.3); color: #f87171; border: 1px solid rgba(153,27,27,0.4); }
.status.success { background: rgba(20,83,45,0.3); color: #4ade80; border: 1px solid rgba(22,101,52,0.4); }
.shortcuts {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 16px;
}
.shortcut {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  color: #71717a;
  background: rgba(39,39,42,0.4);
  border: 1px solid rgba(63,63,70,0.4);
  cursor: pointer;
  transition: color .15s, background .15s, border-color .15s;
  user-select: none;
  font-family: inherit;
}
.shortcut:hover {
  color: #d4d4d8;
  background: #27272a;
  border-color: rgba(82,82,91,0.6);
}
.settings {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin-top: 12px;
}
.setting-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #52525b;
  cursor: pointer;
  user-select: none;
}
.setting-item select {
  background: rgba(39,39,42,0.6);
  border: 1px solid rgba(63,63,70,0.4);
  border-radius: 4px;
  color: #a1a1aa;
  font-size: 12px;
  padding: 2px 6px;
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
}
.setting-item select:hover { border-color: rgba(82,82,91,0.6); }
.hint {
  text-align: center;
  color: #3f3f46;
  font-size: 12px;
  margin-top: 16px;
  user-select: none;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.shake { animation: shake .4s ease-in-out; }
</style>
</head>
<body>
<div class="container">
  <p class="title">Launcher</p>
  <div class="bar-wrap">
    <div class="bar" id="bar">
      <div class="chip" id="chip" style="display:none"></div>
      <input type="text" id="query" autocomplete="off" spellcheck="false"
             placeholder="Tapez un service (google, chatgpt…) et appuyez sur Tab…" />
      <div class="bar-hints">
        <div class="spinner" id="spinner"></div>
        <kbd id="tab-hint">Tab</kbd>
        <kbd>↵</kbd>
      </div>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>
  <div class="status" id="status"></div>
  <div class="shortcuts" id="shortcuts"></div>
  <div class="settings" id="settings">
    <label class="setting-item">
      <span>🌐 Wikipedia</span>
      <select id="wiki-lang-sel">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="it">Italiano</option>
        <option value="pt">Português</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="ru">Русский</option>
      </select>
    </label>
    <label class="setting-item">
      <span>⌨ Par défaut</span>
      <select id="default-proto-sel"></select>
    </label>
  </div>
  <p class="hint">
    Tapez un service&nbsp;&rarr;&nbsp;<kbd>Tab</kbd>&nbsp;&rarr;&nbsp;tapez votre recherche&nbsp;&rarr;&nbsp;<kbd>Enter</kbd>
  </p>
</div>
<script>
function faviconImg(domain, filter) {
  const extra = filter ? `filter:${filter};` : '';
  return `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" alt="" style="width:16px;height:16px;border-radius:2px;object-fit:contain;flex-shrink:0;${extra}" />`;
}

const PROTOCOLS = [
  {id:"google",     aliases:["g"],              name:"Google",     favicon:"google.com",           color:"#4285F4", kind:"web",   rawUrl:"https://www.google.com/",        buildUrl:q=>`https://www.google.com/search?q=${encodeURIComponent(q)}`},
  {id:"duckduckgo", aliases:["ddg","duck"],     name:"DuckDuckGo", favicon:"duckduckgo.com",       color:"#DE5833", kind:"web",   rawUrl:"https://duckduckgo.com/",        buildUrl:q=>`https://duckduckgo.com/?q=${encodeURIComponent(q)}`},
  {id:"chatgpt",    aliases:["gpt","openai"],   name:"ChatGPT",    favicon:"chatgpt.com",          color:"#10a37f", kind:"ai",    rawUrl:"https://chatgpt.com/",           buildUrl:q=>`https://chatgpt.com/?q=${encodeURIComponent(q)}`},
  {id:"claude",     aliases:["anthropic"],      name:"Claude",     favicon:"claude.ai",            color:"#D97757", kind:"ai",    rawUrl:"https://claude.ai/",             buildUrl:q=>`https://claude.ai/new?q=${encodeURIComponent(q)}`},
  {id:"perplexity", aliases:["perp"],           name:"Perplexity", favicon:"perplexity.ai",        color:"#20B8CD", kind:"web",   rawUrl:"https://www.perplexity.ai/",     buildUrl:q=>`https://www.perplexity.ai/search?q=${encodeURIComponent(q)}`},
  {id:"youtube",    aliases:["yt","y"],         name:"YouTube",    favicon:"youtube.com",          color:"#FF0000", kind:"web",   rawUrl:"https://www.youtube.com/",       buildUrl:q=>`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`},
  {id:"github",     aliases:["gh"],             name:"GitHub",     favicon:"github.com",           color:"#24292e", kind:"web",   rawUrl:"https://github.com/",            buildUrl:q=>`https://github.com/search?q=${encodeURIComponent(q)}`},
  {id:"wikipedia",  aliases:["wiki","wp","w"],  name:"Wikipedia",  favicon:"wikipedia.org",        color:"#3366cc", kind:"web",   rawUrl:"https://wikipedia.org/",         buildUrl:q=>`https://en.wikipedia.org/w/index.php?search=${encodeURIComponent(q)}`},
  {id:"steam",      aliases:["s"],              name:"Steam",      favicon:"store.steampowered.com",color:"#1b2838", kind:"steam", buildUrl:id=>`steam://rungameid/${id}`},
];

let activeProtocol = null;
let selectedIdx = -1;
let currentSuggestions = [];
let debounceTimer = null;
let wikiLang = localStorage.getItem('wikiLang') || 'fr';
let defaultProtocolId = localStorage.getItem('defaultProtocol') || 'duckduckgo';

const barEl        = document.getElementById('bar');
const chipEl       = document.getElementById('chip');
const queryEl      = document.getElementById('query');
const spinnerEl    = document.getElementById('spinner');
const suggestEl    = document.getElementById('suggestions');
const statusEl     = document.getElementById('status');
const shortcutsEl  = document.getElementById('shortcuts');
const tabHint      = document.getElementById('tab-hint');
const wikiLangSel  = document.getElementById('wiki-lang-sel');
const defaultProtoSel = document.getElementById('default-proto-sel');

PROTOCOLS.filter(p => p.kind !== 'steam').forEach(p => {
  const opt = document.createElement('option');
  opt.value = p.id;
  opt.textContent = p.name;
  defaultProtoSel.appendChild(opt);
});
wikiLangSel.value = wikiLang;
defaultProtoSel.value = defaultProtocolId;

wikiLangSel.addEventListener('change', () => {
  wikiLang = wikiLangSel.value;
  localStorage.setItem('wikiLang', wikiLang);
  queryEl.focus();
});
defaultProtoSel.addEventListener('change', () => {
  defaultProtocolId = defaultProtoSel.value;
  localStorage.setItem('defaultProtocol', defaultProtocolId);
  queryEl.focus();
});

PROTOCOLS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'shortcut';
  btn.innerHTML = faviconImg(p.favicon) + `<span>${p.name}</span>`;
  btn.addEventListener('click', () => activateProtocol(p));
  shortcutsEl.appendChild(btn);
});

function resolveProtocol(input) {
  const q = input.trim().toLowerCase();
  return PROTOCOLS.find(p => p.id === q || p.name.toLowerCase() === q || p.aliases.includes(q)) || null;
}

function activateProtocol(p) {
  activeProtocol = p;
  chipEl.style.cssText = `display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:14px;font-weight:500;color:#e4e4e7;flex-shrink:0;user-select:none;background:${p.color}33;`;
  chipEl.innerHTML = faviconImg(p.favicon) +
    `<span>${p.name}</span>` +
    `<button class="chip-remove" tabindex="-1" aria-label="Supprimer">` +
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>` +
    `</button>`;
  chipEl.querySelector('.chip-remove').addEventListener('click', e => { e.stopPropagation(); removeChip(); });
  tabHint.style.display = 'none';
  queryEl.placeholder = p.kind === 'steam' ? 'Tapez un jeu…' : 'Tapez votre recherche…';
  queryEl.value = '';
  queryEl.focus();
  clearStatus();
  clearSuggestions();
}

function removeChip() {
  activeProtocol = null;
  chipEl.style.display = 'none';
  chipEl.innerHTML = '';
  tabHint.style.display = '';
  queryEl.placeholder = 'Tapez un service (google, chatgpt…) et appuyez sur Tab…';
  queryEl.value = '';
  queryEl.focus();
  clearSuggestions();
  clearStatus();
}

function setStatus(type, msg) {
  statusEl.className = `status show ${type}`;
  statusEl.textContent = msg;
}
function clearStatus() { statusEl.className = 'status'; }

function shake() {
  barEl.classList.remove('shake');
  void barEl.offsetWidth;
  barEl.classList.add('shake');
  barEl.addEventListener('animationend', () => barEl.classList.remove('shake'), {once:true});
}

// ── Parseur Steam robuste via DOMParser ──────────────────────────────────────
function parseSteamHTML(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const results = [];

  // Chaque résultat est un <a> avec data-ds-appid
  const items = doc.querySelectorAll('a[data-ds-appid]');
  items.forEach(a => {
    const appid = parseInt(a.getAttribute('data-ds-appid'), 10);
    if (!appid) return;

    // Nom : .match_name
    const nameEl = a.querySelector('.match_name');
    const name = nameEl ? nameEl.textContent.trim() : '';
    if (!name) return;

    // Image : première <img> dans le lien
    const imgEl = a.querySelector('img');
    const img = imgEl ? imgEl.getAttribute('src') : '';

    // Prix : .match_subtitle ou .match_price
    const priceEl = a.querySelector('.match_subtitle, .match_price');
    const price = priceEl ? priceEl.textContent.trim() : '';

    results.push({ appid, name, img, price });
  });

  return results;
}

// ── Proxies CORS à essayer dans l'ordre ─────────────────────────────────────
const CORS_PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

async function fetchWithFallback(targetUrl) {
  for (const buildProxy of CORS_PROXIES) {
    try {
      const res = await fetch(buildProxy(targetUrl), { signal: AbortSignal.timeout(6000) });
      if (res.ok) return await res.text();
    } catch (_) { /* essaye le suivant */ }
  }
  return null;
}

async function searchSteam(query) {
  spinnerEl.classList.add('active');
  const steamUrl = `https://store.steampowered.com/search/suggest?term=${encodeURIComponent(query)}&f=games&cc=FR&l=french&use_store_query=1&use_search_suggest_min=0&count=8`;

  const html = await fetchWithFallback(steamUrl);
  spinnerEl.classList.remove('active');

  if (!html) {
    setStatus('error', '⚠️ Steam injoignable. Entrez l\'ID du jeu manuellement.');
    return [];
  }

  const results = parseSteamHTML(html);
  if (!results.length) {
    // Debug : affiche les 300 premiers chars pour détecter un changement de structure
    console.debug('[Steam] HTML reçu (300c) :', html.slice(0, 300));
  }
  return results;
}

// ── Suggestions ──────────────────────────────────────────────────────────────
function updateSuggestions(q) {
  clearTimeout(debounceTimer);
  if (!activeProtocol || activeProtocol.kind !== 'steam' || !q.trim()) { clearSuggestions(); return; }
  debounceTimer = setTimeout(async () => {
    const results = await searchSteam(q);
    currentSuggestions = results;
    selectedIdx = -1;
    if (!results.length) { clearSuggestions(); return; }
    suggestEl.innerHTML = '';
    results.forEach((g, i) => {
      const btn = document.createElement('button');
      btn.className = 'suggestion';
      btn.innerHTML =
        (g.img ? `<img src="${g.img}" onerror="this.style.display='none'" alt="" />` : '') +
        `<div class="suggestion-info">
           <div class="suggestion-name">${g.name}</div>
           <div class="suggestion-sub">App ID ${g.appid}</div>
         </div>` +
        `<span class="suggestion-price">${g.price}</span>`;
      btn.addEventListener('click', () => launchSteam(g));
      btn.addEventListener('mouseenter', () => { selectedIdx = i; highlightSuggestion(); });
      suggestEl.appendChild(btn);
    });
    suggestEl.classList.add('open');
  }, 260);
}

function clearSuggestions() {
  suggestEl.classList.remove('open');
  suggestEl.innerHTML = '';
  currentSuggestions = [];
  selectedIdx = -1;
}
function highlightSuggestion() {
  suggestEl.querySelectorAll('.suggestion').forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
}

function launchSteam(game) {
  const url = activeProtocol.buildUrl(game.appid);
  setStatus('success', `Lancement : ${game.name} — ${url}`);
  clearSuggestions();
  queryEl.value = game.name;
  setTimeout(() => { window.location.href = url; }, 150);
}

function launchWeb(protocol, q) {
  let url;
  if (!q && protocol.rawUrl) {
    url = protocol.rawUrl;
  } else if (protocol.id === 'wikipedia') {
    url = `https://${wikiLang}.wikipedia.org/w/index.php?search=${encodeURIComponent(q)}`;
  } else {
    url = protocol.buildUrl(q);
  }
  setStatus('success', `Ouverture de ${protocol.name}…`);
  clearSuggestions();
  setTimeout(() => { window.open(url, '_blank'); }, 120);
}

// ── Clavier ──────────────────────────────────────────────────────────────────
queryEl.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, currentSuggestions.length - 1); highlightSuggestion(); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, -1); highlightSuggestion(); return; }
  if (e.key === 'Escape')    { clearSuggestions(); return; }

  if (e.key === 'Tab') {
    e.preventDefault();
    if (activeProtocol) return;
    const p = resolveProtocol(queryEl.value);
    if (p) { activateProtocol(p); }
    else if (queryEl.value.trim()) { setStatus('error', `"${queryEl.value.trim()}" inconnu. Essayez : ${PROTOCOLS.map(p=>p.id).join(', ')}`); shake(); }
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    if (!activeProtocol) {
      const p = resolveProtocol(queryEl.value);
      if (p) { activateProtocol(p); return; }
      if (queryEl.value.trim()) {
        const def = PROTOCOLS.find(p => p.id === defaultProtocolId);
        if (def) { launchWeb(def, queryEl.value.trim()); return; }
        setStatus('error', `Protocole inconnu. Essayez : ${PROTOCOLS.map(p=>p.id).join(', ')}`);
        shake();
      }
      return;
    }
    if (activeProtocol.kind === 'steam') {
      if (selectedIdx >= 0 && currentSuggestions[selectedIdx]) { launchSteam(currentSuggestions[selectedIdx]); return; }
      if (currentSuggestions.length > 0) { launchSteam(currentSuggestions[0]); return; }
      const num = parseInt(queryEl.value.trim(), 10);
      if (!isNaN(num) && num > 0) {
        const url = activeProtocol.buildUrl(num);
        setStatus('success', `Lancement App ID ${num} — ${url}`);
        setTimeout(() => { window.location.href = url; }, 150);
        return;
      }
      if (queryEl.value.trim()) { setStatus('error', `Aucun jeu trouvé pour "${queryEl.value.trim()}".`); shake(); }
      return;
    }
    launchWeb(activeProtocol, queryEl.value.trim());
    return;
  }

  if (e.key === 'Backspace' && queryEl.value === '' && activeProtocol) { removeChip(); }
});

queryEl.addEventListener('input', () => { clearStatus(); updateSuggestions(queryEl.value); });
barEl.addEventListener('click', () => queryEl.focus());
document.addEventListener('click', e => { if (!barEl.contains(e.target)) clearSuggestions(); });
queryEl.focus();
</script>
</body>
</html>
